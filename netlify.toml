[build]
  base = "canvas-espresso-narrative-main"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = ".netlify/functions-internal"
  node_bundler = "none"

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
